# mclocks configuration
# ---------------------

[settings]
# Default theme to use if not specified on the command line.
# Available themes: vibrant, warm, fjord
default_theme = vibrant

# Clock format: 12 or 24 (default: 24)
# Can be overridden at runtime with --12h or --24h
time_format = 24

[locations]
# Format: locationN = DISPLAY NAME, Timezone
#
# Use "local" as the timezone to auto-detect from the system.
# Timezone strings follow the IANA format (e.g. America/Los_Angeles).
# See: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
#
# Display order:
#   mclocks 2:  1=top,      2=bottom
#   mclocks 4:  1=top-left, 2=bottom-left, 3=top-right, 4=bottom-right
location1 = LOCAL, local
location2 = SAN FRANCISCO, America/Los_Angeles
location3 = SINGAPORE, Asia/Singapore
location4 = NEW YORK, America/New_York